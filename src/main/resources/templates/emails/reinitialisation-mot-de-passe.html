<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .container { max-width: 600px; margin: 20px auto; background: white; border-radius: 8px; padding: 30px; }
        .header { background: #1E3A5F; color: white; padding: 20px; border-radius: 8px 8px 0 0; text-align: center; }
        .code { font-size: 32px; font-weight: bold; color: #2E75B6; text-align: center; letter-spacing: 8px; margin: 20px 0; }
        .footer { color: #999; font-size: 12px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h2>Réinitialisation de mot de passe</h2></div>
    <p>Bonjour <strong th:text="${prenoms + ' ' + nom}"></strong>,</p>
    <p>Voici votre code de vérification :</p>
    <div class="code" th:text="${code}"></div>
    <p>Ce code expire dans <strong>15 minutes</strong>.</p>
    <p>Si vous n'avez pas demandé cette réinitialisation, ignorez cet email.</p>
    <div class="footer">GTS — Gestion Transport et Services</div>
</div>
</body>
</html>
