# Override at runtime via APP_CORS_ALLOWED_ORIGINS env var (comma-separated, no extra spaces).
# The default below is the production frontend URL and is used when the env var is not set.
server.port=8081
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://gts-frontend-production-6919.up.railway.app}
spring.jpa.show-sql=false
springdoc.swagger-ui.enabled=false
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/db_gts?serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
logging.level.root=WARN
logging.level.com.gts=INFO
