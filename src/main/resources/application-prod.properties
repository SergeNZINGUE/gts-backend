# Override at runtime via APP_CORS_ALLOWED_ORIGINS env var (comma-separated, no extra spaces).
# The default below is the production frontend URL and is used when the env var is not set.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://gts-frontend-production-6919.up.railway.app}
spring.jpa.show-sql=false
springdoc.swagger-ui.enabled=false
spring.jpa.hibernate.ddl-auto=validate
logging.level.root=WARN
logging.level.com.gts=INFO
